name: Checks

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - '.readthedocs.yml'
      - '*.md'
      - 'pyproject.toml'
      - 'tox.toml'
      - 'uv.lock'
      - 'zensical.toml'

permissions:
  contents: read

jobs:
  test:
    name: test with ${{ matrix.env }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }} - ${{ matrix.os }}--${{ matrix.env }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        env:
          - "3.15.0a7"
          - "3.14.3"
          - "3.14.0"
          - "3.13"
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      
      - name: Add .local/bin to Windows PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "$USERPROFILE/.local/bin" >> $GITHUB_PATH
      
      - name: Install tox
        run: uv tool install --python-preference only-managed --python 3.14 tox --with tox-uv --with tox-gh
      
      - name: Install Python
        run: uv python install --python-preference only-managed $PYTHON_VERSION
        env:
          PYTHON_VERSION: ${{ matrix.env }}
      
      - name: Setup test suite
        run: tox run -vv --notest --skip-missing-interpreters false
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.env }}
      
      - name: Run test suite
        run: tox run --skip-pkg-install
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.env }}
