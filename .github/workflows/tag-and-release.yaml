name: Version Bump and Release

on:
  workflow_dispatch: # Allow manual triggering
  push:
    branches: ["main"]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - 'tests/**'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - '.readthedocs.yml'
      - 'docs.md'
      - 'plans.md'
      - 'project_architecture.md'
      - 'pyproject.toml'
      - 'tox.toml'
      - 'uv.lock'
      - 'zensical.toml'

permissions:
  contents: read

jobs:
  bump-version-and-release:
    name: Bump version and create a release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Fetch all history for proper tag creation
          token: ${{ secrets.BOT_TOKEN }} # zizmor: ignore[secrets-outside-env]
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Current version
        id: current_version
        run: |
          CURRENT_VERSION=$(uv version | awk '{print $2}')
          PATCH=$("$CURRENT_VERSION" | cut -d '.' -f 2)
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      # If a new minor or major version tag has been pushed then don't
      # bump the patch version.
      - name: Bump version
        if: steps.current_version.outputs.patch != '0'
        run: |
          uv version --bump patch
      
      - name: New version
        id: new_version
        run: |
          NEW_VERSION=$(uv version | awk '{print $2}')
          echo "tag=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version change
        run: |
          git remote set-url origin https://x-access-token:$BOT_TOKEN@github.com/gwyli/swopy.git
          git config --local user.email "218805929+amati-bot@users.noreply.github.com"
          git config --local user.name "amati[bot]"
          git commit uv.lock pyproject.toml -m "Bump version to ${STEPS_NEW_VERSION_OUTPUTS_TAG}"
          git push origin
        env:
          STEPS_NEW_VERSION_OUTPUTS_TAG: ${{ steps.new_version.outputs.tag }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Create and push tag
        run: |
          git tag ${STEPS_NEW_VERSION_OUTPUTS_TAG}
          git push --tags
        env:
          STEPS_NEW_VERSION_OUTPUTS_TAG: ${{ steps.new_version.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }} # zizmor: ignore[secrets-outside-env]
          STEPS_NEW_VERSION_OUTPUTS_TAG: ${{ steps.new_version.outputs.tag }}
        run: |
          gh release create ${STEPS_NEW_VERSION_OUTPUTS_TAG} \
            --title "${STEPS_NEW_VERSION_OUTPUTS_TAG}" \
            --generate-notes \
            --latest
