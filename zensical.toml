[project]
site_name = "swopy"
site_description = "Bidirectional conversion between numeral systems"
repo_url = "https://github.com/gwyli/swopy"

nav = [
  { "Home" = "index.md" },
  { "API Reference" = ["reference/terms.md","reference/api.md","reference/systems.md","reference/conlangs.md"]}
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings]
default_handler = "python"
markdown_extensions = ["admonition", "pymdownx.details", "pymdownx.superfences"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = false
show_root_heading = true
show_root_full_path = false
filters = ["!^_"]

